name: 🐛 Bug Report
description: Report a broken workflow or integration issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"
  - type: input
    id: workflow
    attributes:
      label: Affected Workflow
      placeholder: e.g. rss-fetcher, telegram-sender
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open workflow\n2. Execute\n3. See error"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
